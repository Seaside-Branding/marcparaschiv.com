<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Admin</title>
  <link rel="icon" type="image/svg+xml" href="../images/seasidebranding.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; margin: 0; color: #0f172a; background: #f8fafc; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px 16px; }
    .card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 24px; }
    h1 { font-size: 22px; margin: 0 0 20px; }
    h2 { font-size: 15px; font-weight: 600; margin: 0 0 12px; color: #475569; }
    label { display: block; margin: 0 0 6px; font-weight: 600; font-size: 13px; color: #334155; }
    .field { margin-bottom: 16px; }
    input, select { width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; background: #fff; color: #0f172a; }
    button { padding: 10px 16px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; background: #fff; color: #0f172a; cursor: pointer; }
    .full-width { width: 100%; }
    input[type="file"] { padding: 8px 10px; }
    button.primary { background: #0ea5e9; color: #fff; border-color: #0ea5e9; }
    button.primary:hover:not(:disabled) { background: #0284c7; border-color: #0284c7; }
    button.danger { background: #ef4444; color: #fff; border-color: #ef4444; }
    button.danger:hover:not(:disabled) { background: #dc2626; border-color: #dc2626; }
    button.ghost { background: #e2e8f0; color: #0f172a; border-color: #e2e8f0; }
    button.ghost:hover:not(:disabled) { background: #cbd5e1; }
    button:disabled { background: #cbd5e1; color: #94a3b8; border-color: #cbd5e1; cursor: not-allowed; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .status { margin-top: 12px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size: 13px; background: #f1f5f9; border: 1px dashed #cbd5e1; padding: 12px; border-radius: 8px; max-height: 220px; overflow: auto; white-space: pre-wrap; }
    .status:empty { display: none; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
    .tile { border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; background: #fff; display: flex; flex-direction: column; }
    .tile img { width: 100%; height: 160px; object-fit: cover; display: block; }
    .tile .meta { padding: 8px; font-size: 12px; display: flex; justify-content: space-between; align-items: center; gap: 6px; }
    .tile .meta span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
    .nav { display: flex; gap: 2px; margin-bottom: 20px; background: #f1f5f9; border-radius: 8px; padding: 4px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .nav button { flex: 0 0 auto; padding: 8px 18px; border-radius: 6px; border: none; background: transparent; color: #475569; font-weight: 500; cursor: pointer; transition: background 0.15s; }
    .nav button.active { background: #fff; color: #0ea5e9; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .nav button:hover:not(.active) { background: #e2e8f0; }
    .section { display: none; }
    .section.active { display: block; }
    .login { max-width: 420px; margin: 48px auto; }
    .login h1 { text-align: center; margin-bottom: 24px; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; gap: 8px; }
    .header .who { font-size: 13px; color: #334155; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .divider { height: 1px; background: #e2e8f0; margin: 20px 0; }

    @media (max-width: 1024px) {
      .container { padding: 16px 14px; }
      .tile img { height: 150px; }
    }
    @media (max-width: 768px) {
      .container { padding: 12px; }
      .card { padding: 18px; }
      .row { grid-template-columns: 1fr; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
      .tile img { height: 140px; }
      .header { flex-direction: column; align-items: flex-start; gap: 6px; }
      .header .who { justify-content: flex-start; }
      h1 { font-size: 20px; }
    }
    @media (max-width: 480px) {
      .container { padding: 10px; }
      .card { padding: 14px; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
      .tile img { height: 120px; }
      input, select { font-size: 16px; }
      .login { margin: 20px auto; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="login" class="card login">
      <h1>Admin Login</h1>
      <div class="field">
        <label for="username">Username</label>
        <input id="username" type="text" placeholder="Enter username" autocomplete="username">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Enter password" autocomplete="current-password">
      </div>
      <button id="loginBtn" class="primary full-width">Sign in</button>
      <div class="status" id="loginStatus"></div>
    </div>

    <div id="app" class="card" style="display:none;">
      <div class="header">
        <h1>Portfolio Admin</h1>
        <div class="who"><span id="who"></span> <button id="logout" class="ghost">Sign out</button></div>
      </div>
      <div class="nav">
        <button data-tab="upload" class="active">Upload</button>
        <button data-tab="manage">Manage</button>
      </div>

      <div id="upload" class="section active">
        <div class="field">
          <label for="category">Category</label>
          <select id="category">
            <option value="portfolio">portfolio</option>
            <option value="portrait">portrait</option>
            <option value="nature">nature</option>
            <option value="event">event</option>
            <option value="advertising">advertising</option>
            <option value="architecture">architecture</option>
            <option value="places">places</option>
          </select>
        </div>
        <div class="field">
          <label for="files">Images</label>
          <input id="files" type="file" multiple accept="image/*">
        </div>
        <button id="uploadBtn" class="primary full-width">Upload</button>
        <div class="status" id="status"></div>
      </div>

      <div id="manage" class="section">
        <h2>Uploaded (deletable)</h2>
        <div class="grid" id="blobGrid"></div>
        <h2 style="margin-top:16px;">Local (hidable)</h2>
        <div class="grid" id="localGrid"></div>
        <div class="status" id="manageStatus"></div>
      </div>
    </div>
  </div>
  <script src="../js/admin.js" defer></script>
</body>
</html>
